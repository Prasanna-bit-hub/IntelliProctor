<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Session Report</title>

    <link
        rel="stylesheet"
        href="/static/css/style.css"
    >

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="page-container">

    <div class="page-header">

        <h1>
            AI Session Report
        </h1>
        <a
    href="/download_report"
    class="back-btn"
>
    Download PDF
</a>

        <a
            href="/"
            class="back-btn"
        >
            ← Back
        </a>

    </div>

    <!-- REPORT CARDS -->

    <div class="report-grid">

        <div class="report-card">

            <h3>Total Alerts</h3>

            <p>
                {{ report.total_alerts }}
            </p>

        </div>

        <div class="report-card">

            <h3>Integrity Score</h3>

            <p>
                {{ report.integrity_score }}
            </p>

        </div>

        <div class="report-card">

            <h3>Status</h3>

            <p>
                {{ report.status }}
            </p>

        </div>

    </div>

    <!-- CHART -->

    <div class="chart-box">

        <canvas id="reportChart"></canvas>

    </div>

    <!-- BREAKDOWN -->

    <div class="breakdown-box">

        <h2>
            Alert Breakdown
        </h2>

        <div class="breakdown-list">

            {% for key, value in report.breakdown.items() %}

            <div class="breakdown-item">

                <span>{{ key }}</span>

                <span>{{ value }}</span>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

<script>

const ctx =
    document.getElementById(
        'reportChart'
    );

new Chart(ctx, {

    type:'pie',

    data:{

        labels:{{ report.breakdown.keys()|list|tojson }},

        datasets:[{

            data:{{ report.breakdown.values()|list|tojson }}

        }]
    }
});

</script>

</body>

</html>
